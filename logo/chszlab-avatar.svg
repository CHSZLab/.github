<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>

    <!-- Glow filters for each color -->
    <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#42a5f5" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-purple" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ab47bc" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-teal" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#26c6da" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#66bb6a" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-orange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ffa726" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-coral" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ef5350" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-pink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ec407a" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ffca28" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      @keyframes pulse {
        0%, 100% { opacity: 0.85; r: 16; }
        50% { opacity: 1; r: 19; }
      }
      .node { animation: pulse 3s ease-in-out infinite; }
      .n1 { animation-delay: 0s; }
      .n2 { animation-delay: 0.4s; }
      .n3 { animation-delay: 0.8s; }
      .n4 { animation-delay: 1.2s; }
      .n5 { animation-delay: 1.6s; }
      .n6 { animation-delay: 2.0s; }
      .n7 { animation-delay: 2.4s; }
      .n8 { animation-delay: 2.8s; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>

  <!-- Graph edges (unified, no partition) -->
  <!-- Original left cluster internal edges -->
  <line x1="120" y1="110" x2="170" y2="170" stroke="#546e7a" stroke-width="2.5" opacity="0.4"/>
  <line x1="120" y1="110" x2="100" y2="195" stroke="#546e7a" stroke-width="2.5" opacity="0.4"/>
  <line x1="170" y1="170" x2="100" y2="195" stroke="#546e7a" stroke-width="2.5" opacity="0.4"/>
  <line x1="100" y1="195" x2="140" y2="275" stroke="#546e7a" stroke-width="2.5" opacity="0.4"/>
  <line x1="170" y1="170" x2="140" y2="275" stroke="#546e7a" stroke-width="2.5" opacity="0.4"/>

  <!-- Original right cluster internal edges -->
  <line x1="290" y1="100" x2="310" y2="185" stroke="#546e7a" stroke-width="2.5" opacity="0.4"/>
  <line x1="290" y1="100" x2="240" y2="165" stroke="#546e7a" stroke-width="2.5" opacity="0.4"/>
  <line x1="240" y1="165" x2="310" y2="185" stroke="#546e7a" stroke-width="2.5" opacity="0.4"/>
  <line x1="310" y1="185" x2="280" y2="280" stroke="#546e7a" stroke-width="2.5" opacity="0.4"/>
  <line x1="240" y1="165" x2="280" y2="280" stroke="#546e7a" stroke-width="2.5" opacity="0.4"/>

  <!-- Cross edges (now solid, same style as rest) -->
  <line x1="170" y1="170" x2="240" y2="165" stroke="#546e7a" stroke-width="2.5" opacity="0.4"/>
  <line x1="140" y1="275" x2="280" y2="280" stroke="#546e7a" stroke-width="2.5" opacity="0.4"/>

  <!-- Nodes with varied colors and flashing glow -->
  <circle class="node n1" cx="120" cy="110" r="16" fill="#42a5f5" filter="url(#glow-blue)"/>
  <circle class="node n2" cx="170" cy="170" r="16" fill="#ab47bc" filter="url(#glow-purple)"/>
  <circle class="node n3" cx="100" cy="195" r="16" fill="#26c6da" filter="url(#glow-teal)"/>
  <circle class="node n4" cx="140" cy="275" r="16" fill="#66bb6a" filter="url(#glow-green)"/>
  <circle class="node n5" cx="290" cy="100" r="16" fill="#ffa726" filter="url(#glow-orange)"/>
  <circle class="node n6" cx="240" cy="165" r="16" fill="#ef5350" filter="url(#glow-coral)"/>
  <circle class="node n7" cx="310" cy="185" r="16" fill="#ec407a" filter="url(#glow-pink)"/>
  <circle class="node n8" cx="280" cy="280" r="16" fill="#ffca28" filter="url(#glow-gold)"/>

  <!-- Text at bottom -->
  <text x="200" y="360" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" text-anchor="middle" letter-spacing="2">
    <tspan fill="#c1002a">CHSZ</tspan><tspan fill="#78909c">Lab</tspan>
  </text>
</svg>
