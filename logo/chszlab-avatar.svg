<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="url(#bg)"/>

  <!-- Graph edges (drawn first, behind nodes) -->
  <!-- Left cluster edges (blue) -->
  <line x1="120" y1="110" x2="170" y2="170" stroke="#42a5f5" stroke-width="3" opacity="0.45"/>
  <line x1="120" y1="110" x2="100" y2="195" stroke="#42a5f5" stroke-width="3" opacity="0.45"/>
  <line x1="170" y1="170" x2="100" y2="195" stroke="#42a5f5" stroke-width="3" opacity="0.45"/>
  <line x1="100" y1="195" x2="140" y2="275" stroke="#42a5f5" stroke-width="3" opacity="0.45"/>
  <line x1="170" y1="170" x2="140" y2="275" stroke="#42a5f5" stroke-width="3" opacity="0.45"/>

  <!-- Right cluster edges (orange) -->
  <line x1="290" y1="100" x2="310" y2="185" stroke="#ff8a65" stroke-width="3" opacity="0.45"/>
  <line x1="290" y1="100" x2="240" y2="165" stroke="#ff8a65" stroke-width="3" opacity="0.45"/>
  <line x1="240" y1="165" x2="310" y2="185" stroke="#ff8a65" stroke-width="3" opacity="0.45"/>
  <line x1="310" y1="185" x2="280" y2="280" stroke="#ff8a65" stroke-width="3" opacity="0.45"/>
  <line x1="240" y1="165" x2="280" y2="280" stroke="#ff8a65" stroke-width="3" opacity="0.45"/>

  <!-- Cut edges (red dashed) -->
  <line x1="170" y1="170" x2="240" y2="165" stroke="#c1002a" stroke-width="2.5" stroke-dasharray="7,5" opacity="0.55"/>
  <line x1="140" y1="275" x2="280" y2="280" stroke="#c1002a" stroke-width="2.5" stroke-dasharray="7,5" opacity="0.55"/>

  <!-- Left cluster nodes (blue) -->
  <circle cx="120" cy="110" r="16" fill="#42a5f5"/>
  <circle cx="170" cy="170" r="16" fill="#42a5f5"/>
  <circle cx="100" cy="195" r="16" fill="#42a5f5"/>
  <circle cx="140" cy="275" r="16" fill="#42a5f5"/>

  <!-- Right cluster nodes (orange) -->
  <circle cx="290" cy="100" r="16" fill="#ff8a65"/>
  <circle cx="240" cy="165" r="16" fill="#ff8a65"/>
  <circle cx="310" cy="185" r="16" fill="#ff8a65"/>
  <circle cx="280" cy="280" r="16" fill="#ff8a65"/>

  <!-- Text at bottom -->
  <text x="200" y="360" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="42" font-weight="700" text-anchor="middle" letter-spacing="2">
    <tspan fill="#c1002a">CHSZ</tspan><tspan fill="#78909c">Lab</tspan>
  </text>
</svg>
